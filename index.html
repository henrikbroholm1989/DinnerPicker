<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Aftensmad</title>

    <link rel="stylesheet" href="css/styles.css">

    <script type="module" src="js/app.js" defer></script>
</head>

<body>

    <main class="container">

        <header class="page-header">

            <h1>🍽️ Aftensmad</h1>

            <p>Find inspiration til madplanen.</p>

        </header>

        <div class="content">

            <aside class="filters">

                <section>

                    <h2>Filtrering</h2>

                    <div class="match-mode">

                        <label>
                            <input
                                type="radio"
                                name="mode"
                                value="all"
                                checked>

                            Matcher alle tags
                        </label>

                        <label>
                            <input
                                type="radio"
                                name="mode"
                                value="any">

                            Matcher mindst ét tag
                        </label>

                    </div>

                    <h2>Tags</h2>

                    <div
                        id="tagContainer"
                        class="tag-container">
                    </div>

                </section>

            </aside>

            <section class="results">

                <div id="resultInfo" class="result-info"></div>

<button id="newSuggestionsBtn" class="secondary-btn hidden">
    🔄 Nye forslag
</button>

                <div
                    id="recipeContainer"
                    class="recipe-container">
                </div>

            </section>

        </div>

    </main>

</body>
</html>
